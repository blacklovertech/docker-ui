    function monitorEvent(){
        // 事件抽屉：只做最小实现（内存缓存 + 简单渲染）
        if (!window.__dockerEventState) {
            window.__dockerEventState = {
                list: [],
                unread: 0,
                max: 200,
            };
        }

        function formatEventTime(evt) {
            try {
                if (evt && evt.timeNano) {
                    return new Date(evt.timeNano / 1000000).pattern('yyyy-MM-dd HH:mm:ss');
                }
                if (evt && evt.time) {
                    return new Date(evt.time * 1000).pattern('yyyy-MM-dd HH:mm:ss');
                }
            } catch (e) {}
            return '';
        }

        function parseEventsFromChunk(chunk) {
            if ($.extends.isEmpty(chunk)) return [];

            // $.app.ajaxStream 的 onChunksFn 会传入「按行切好的数组」，每一项一般是 JSON 字符串 + "\n"
            if ($.isArray(chunk)) {
                let events = [];
                for (let i = 0; i < chunk.length; i++) {
                    let line = (chunk[i] || '').toString().trim();
                    if (!line) continue;
                    if (line[0] !== '{' && line[0] !== '[') continue;

                    try {
                        let one = $.extends.json.toobject2(line);
                        if ($.isArray(one)) {
                            // 兼容某些情况下返回数组（虽然 Docker event 通常是单对象）
                            for (let j = 0; j < one.length; j++) {
                                if (one[j] && typeof one[j] === 'object') events.push(one[j]);
                            }
                        } else if (one && typeof one === 'object') {
                            events.push(one);
                        }
                    } catch (e) {
                        // ignore parse errors for partial chunks
                    }
                }
                return events;
            }

            // chunk 也可能是单个 JSON 字符串
            let text = chunk;
            if (typeof chunk !== 'string') {
                try { text = JSON.stringify(chunk); } catch (e) { return []; }
            }

            let lines = text.split('\n').map(function (l){ return (l || '').trim(); }).filter(function (l){ return l.length > 0; });
            let events = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (line[0] !== '{' && line[0] !== '[') continue;
                try {
                    let one = $.extends.json.toobject2(line);
                    if ($.isArray(one)) {
                        for (let j = 0; j < one.length; j++) {
                            if (one[j] && typeof one[j] === 'object') events.push(one[j]);
                        }
                    } else if (one && typeof one === 'object') {
                        events.push(one);
                    }
                } catch (e) {
                    // ignore parse errors for partial chunks
                }
            }
            return events;
        }

        function renderEventDrawer() {
            let state = window.__dockerEventState;
            let container = $('#eventDrawerBody');
            if (container.isNull()) return;

            if (!state.list || state.list.length === 0) {
                container.html('<div style="color:#888;">暂无事件</div>');
                return;
            }

            let html = '';
            for (let idx = state.list.length - 1; idx >= 0; idx--) {
                let e = state.list[idx] || {};
                if (typeof e === 'string') {
                    try {
                        e = $.extends.json.toobject2(e);
                    } catch (ex) {
                        e = {};
                    }
                }
                if (!e || typeof e !== 'object') {
                    continue;
                }
                let t = formatEventTime(e);
                let type = e.Type || '';
                let action = e.Action || '';
                let id = (e.Actor && e.Actor.ID) ? e.Actor.ID : '';
                let scope = e.scope || '';

                html += '<div style="padding:6px 0;border-bottom:1px dashed #eee;">'
                    +   '<div style="font-size:12px;color:#666;">' + t + (scope ? (' · ' + scope) : '') + '</div>'
                    +   '<div style="margin-top:2px;">'
                    +     '<span style="font-weight:600;">' + type + '</span>'
                    +     (action ? (' <span style="color:#333;">' + action + '</span>') : '')
                    +   '</div>'
                    +   (id ? ('<div style="font-size:12px;color:#888;">' + id + '</div>') : '')
                    + '</div>';
            }
            container.html(html);
        }

        $.docker.request.system.event(function (chunk, xhr, state) {
            console.log("Docker Event")
            console.log(xhr)

            if(!$.extends.isEmpty(chunk)){

                console.log(chunk)

                let events = parseEventsFromChunk(chunk);
                if (events.length > 0) {
                    let stateObj = window.__dockerEventState;
                    for (let i = 0; i < events.length; i++) {
                        stateObj.list.push(events[i]);
                        stateObj.unread += 1;
                    }
                    if (stateObj.list.length > stateObj.max) {
                        stateObj.list = stateObj.list.slice(stateObj.list.length - stateObj.max);
                    }
                    $('.title-event').text(stateObj.unread);
                    renderEventDrawer();
                }
            }
        }, local_node, function(){

        }, function (xhr, status) {
            $.app.show('事件监控退出，5秒后重新建立监控事件.....');
            $.easyui.thread.sleep(function (){
                monitorEvent()
            }, 5000)
        })
    }

    function showEvent(){
        // 展开右侧抽屉
        try {
            $('#index_layout').layout('expand','east');
        } catch (e) {
            // ignore
        }

        // 打开即视为“已读”
        if (window.__dockerEventState) {
            window.__dockerEventState.unread = 0;
        }
        $('.title-event').text('0');
    }


</script>
