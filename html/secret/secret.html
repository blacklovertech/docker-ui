<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:jc="http://www.joinsunsoft.com">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <script src="/static/common/js/ui.js"></script>
</head>

<body>
<div id="loading" class="loading-wrap">
    <div class="loading-content">
        <div class="loading-round"></div>
        <div class="loading-dot"></div>
    </div>
</div>
<script id="tmpl1" type="text/x-jquery-tmpl">

<div id='layout' data-toggle="cubeui-layout" data-options="fit:true">
    <div data-options="region:'center',title:'',split:false,collapsible:false,border:true,width:1000,iconCls:'fa fa-user-circle-o',
    headerCls:'border_right',bodyCls:'border_right'">

        <table id="secretsDg"></table>
        <!-- 表格工具栏开始 -->
        <div id="secretsDg-toolbar" class="cubeui-toolbar"
             data-options="grid:{
                   type:'datagrid',
                   id:'secretsDg'
               }">

            <a  href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        createLease();
                    },
                    extend: '#secretsDg-toolbar',
                    btnCls: 'cubeui-btn-blue',
                    iconCls: 'fa fa-plus'
                }"><span data-i18n="secrets.toolbar.create">创建密码</span></a>

            <a  href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                onClick:function(){
                    updateTags();
                },
                btnCls: 'cubeui-btn-slateblue',
                iconCls: 'fa fa-tags'
            }"><span data-i18n="secrets.toolbar.editMetadata">编辑元数据</span></a>


            <a  href="javascript:void(0)" disabled data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        updateData();
                    },
                    extend: '#secretsDg-toolbar',
                    btnCls: 'cubeui-btn-orange',
                    iconCls: 'fa fa-pencil-square-o'
                }"><span data-i18n="secrets.toolbar.updateData">修改密码</span></a>

            <a  href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        removeLease();
                    },
                    extend: '#secretsDg-toolbar',
                    btnCls: 'cubeui-btn-red',
                    iconCls: 'fa fa-times'
                }"><span data-i18n="secrets.toolbar.remove">删除密码</span></a>

            <form id="queryForm" class="search-box">

                <span style='line-height: 30px;padding-left:2px;padding-right:2px' data-i18n="secrets.search.type">查询方式</span>

                <input type="text" id='search_type' name="search_type" value="name" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                            required:true,prompt:'',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[{'KEY':'name','TEXT':'Name'},{'KEY':'label','TEXT':'Label'},{'KEY':'names','TEXT':'Names'},
                                {'KEY':'id','TEXT':'ID'}]
                       ">
                <input type="text" id='search_key' name="search_key" data-toggle="cubeui-textbox"
                       data-options="onClear:function(){
                            $('#searchbtn').trigger('click');
                      }, mask:'{{:~js(prefix)}}', prompt:'',width:420">
                <a href="javascript:void(0)" id="searchbtn"
                   data-toggle="cubeui-menubutton"
                   data-options="method:'query',
                   iconCls:'fa fa-search',
                   btnCls:'cubeui-btn-blue',
                   form:{id:'queryForm'},
                     grid:{type:'datagrid','id':'secretsDg'}"><span data-i18n="common.btn.search">查询</span></a>
            </form>
        </div>
    </div>
</div>
<!-- 表格工具栏结束 -->
<div id="searchImageMm" data-toggle="cubeui-menu" style="width:120px;display:none" data-options="">
    <div onclick="pullImgFromMenu()" data-options="iconCls:'fa fa-download'"><span data-i18n="images.menu.pullLatest">拉取latest镜像</span></div>
    <div onclick="setImgFromMenu()" data-options="iconCls:'fa fa-check-square-o'"><span data-i18n="images.menu.setTag">指定镜像Tag</span></div>
</div>
</script>

</body>
<script>
    new APP(function () {
        return {
            css: [],
            js: [
                ROOT_RES_URL + "/api/api.js",
                ROOT_RES_URL + "/api/title.js",
                ROOT_RES_URL + "/secret/secret.js",
            ],
            render: function () {
                stop = true
                console.log("finish")
                APP.renderBody("#tmpl1", {})
                refreshImageAndContainerInfo()

                // let t = $.templates("#tmpl1").render({id:"1022", name:"davidliu"})
                // $('body div').remove()
                // $(t).appendTo($('body'))
            }
        }
    });


    APP.fn(function(){
        loadLease();
    })
</script>
</html>
