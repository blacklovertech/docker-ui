<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:jc="http://www.joinsunsoft.com">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <script src="/static/common/js/ui.js"></script>
</head>

<body>
<div id="loading" class="loading-wrap">
    <div class="loading-content">
        <div class="loading-round"></div>
        <div class="loading-dot"></div>
    </div>
</div>
<script id="tmpl1" type="text/x-jquery-tmpl">

<div id='layout' data-toggle="cubeui-layout" data-options="fit:true">
    <div data-options="region:'center',title:'',split:false,collapsible:false,border:true,width:1000,iconCls:'fa fa-user-circle-o',
    headerCls:'border_right',bodyCls:'border_right'">

        <table id="configsDg"></table>
        <!-- 表格工具栏开始 -->
        <div id="configsDg-toolbar" class="cubeui-toolbar"
             data-options="grid:{
                   type:'datagrid',
                   id:'configsDg'
               }">


            <a id="configsCreateBtn" href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        createLease();
                    },
                    btnCls: 'cubeui-btn-blue',
                    iconCls: 'fa fa-plus'
                }">{{:~t("configs.toolbar.create")}}</a>

            <a id="configsEditMetadataBtn" href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                onClick:function(){
                    updateTags();
                },
                btnCls: 'cubeui-btn-slateblue',
                iconCls: 'fa fa-tags'
            }">{{:~t("configs.toolbar.editMetadata")}}</a>

            <a id="configsUpdateBtn" href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        updateData();
                    },
                    extend: '#secretsDg-toolbar',
                    btnCls: 'cubeui-btn-orange',
                    iconCls: 'fa fa-pencil-square-o'
                }">{{:~t("configs.toolbar.update")}}</a>


            <a id="configsRemoveBtn" href="javascript:void(0)" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        removeLease();
                    },
                    extend: '#configsDg-toolbar',
                    btnCls: 'cubeui-btn-red',
                    iconCls: 'fa fa-times'
                }">{{:~t("configs.toolbar.remove")}}</a>

            <form id="queryForm" class="search-box">

                <span style='line-height: 30px;padding-left:2px;padding-right:2px'>{{:~t("configs.search.type")}}</span>

                <input type="text" id='search_type' name="search_type" value="name" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                            required:true,prompt:'{{:~t("configs.prompt.typeRequired")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[{'KEY':'name','TEXT':'Name'},{'KEY':'label','TEXT':'Label'},{'KEY':'names','TEXT':'Names'},
                                {'KEY':'id','TEXT':'ID'}]
                       ">
                <input type="text" id='search_key' name="search_key" data-toggle="cubeui-textbox"
                       data-options="onClear:function(){
                            $('#searchbtn').trigger('click');
                      }, mask:'{{:~js(prefix)}}', prompt:'{{:~t("configs.search.placeholder")}}',width:420">
                     <a href="javascript:void(0)" id="searchbtn"
                   data-toggle="cubeui-menubutton"
                   data-options="method:'query',
                   iconCls:'fa fa-search',
                   btnCls:'cubeui-btn-blue',
                   form:{id:'queryForm'},
                         grid:{type:'datagrid','id':'configsDg'}">{{:~t("common.btn.search")}}</a>
            </form>
        </div>
    </div>
</div>
<!-- 表格工具栏结束 -->
<div id="searchImageMm" data-toggle="cubeui-menu" style="width:120px;display:none" data-options="">
    <div onclick="pullImgFromMenu()" data-options="iconCls:'fa fa-download'">{{:~t("images.menu.pullLatest")}}</div>
    <div onclick="setImgFromMenu()" data-options="iconCls:'fa fa-check-square-o'">{{:~t("images.menu.setTag")}}</div>
</div>
</script>

</body>
<script>
    new APP(function () {
        return {
            css: [],
            js: [
                ROOT_RES_URL + "/api/api.js",
                ROOT_RES_URL + "/api/title.js",
                ROOT_RES_URL + "/config/config.js",
            ],
            render: function () {
                stop = true
                console.log("finish")
                APP.renderBody("#tmpl1", {})
                try {
                    var i18n = (window.APP && window.APP.i18n) ? window.APP.i18n : window.APP_I18N;
                    if (i18n && i18n.apply) {
                        i18n.apply(document);
                    }
                } catch (e) {}
                try {
                    if (typeof __configs_applyControlsI18n === 'function') {
                        __configs_applyControlsI18n();
                    }
                } catch (e2) {}
                refreshImageAndContainerInfo()

                // let t = $.templates("#tmpl1").render({id:"1022", name:"davidliu"})
                // $('body div').remove()
                // $(t).appendTo($('body'))
            }
        }
    });


    APP.fn(function(){
        loadLease();
    })
</script>
</html>
