<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:jc="http://www.joinsunsoft.com">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <script src="/static/common/js/ui.js"></script>
</head>

<body>
<div id="loading" class="loading-wrap">
    <div class="loading-content">
        <div class="loading-round"></div>
        <div class="loading-dot"></div>
    </div>
</div>
<script id="tmpl1" type="text/x-jquery-tmpl">

<div id='layout' data-toggle="cubeui-layout" data-options="fit:true">
    <div data-options="region:'center',title:'',split:false,collapsible:false,border:true,width:1000,iconCls:'fa fa-user-circle-o',
    headerCls:'border_right',bodyCls:'border_right'">

        <table id="networksDg"></table>
        <!-- 表格工具栏开始 -->
        <div id="networksDg-toolbar" class="cubeui-toolbar"
             data-options="grid:{
                   type:'datagrid',
                   id:'networksDg'
               }">


            <a  href="javascript:void(0)" id="networkCreateBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        createLease();
                    },
                    btnCls: 'cubeui-btn-blue',
                    iconCls: 'fa fa-plus'
                }">{{:~t("network.toolbar.create")}}</a>

            <a  href="javascript:void(0)" id="networkCloneBtn" data-toggle='cubeui-menubutton' data-options="{
                onClick:function(){
                    cloneLease();
                },
                btnCls: 'cubeui-btn-slateblue',
                iconCls: 'fa fa-tags'
            }">{{:~t("network.toolbar.clone")}}</a>

            <a  href="javascript:void(0)" id="networkRemoveBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        removeLease();
                    },
                    extend: '#networksDg-toolbar',
                    btnCls: 'cubeui-btn-red',
                    iconCls: 'fa fa-times'
                }">{{:~t("network.toolbar.remove")}}</a>

            <a  href="javascript:void(0)" id="networkPruneBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        pruneLease();
                    },
                    extend: '#secretsDg-toolbar',
                    btnCls: 'cubeui-btn-orange',
                    iconCls: 'fa fa-trash'
                }">{{:~t("network.toolbar.prune")}}</a>

            <form id="queryForm" class="search-box">

                                <span style='line-height: 30px;padding-right:0px'>{{:~t("network.search.driver")}}</span>
                <input type="text" id="driver_network" name="driver" value="" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                            required:false,prompt:'{{:~t("common.prompt.emptyAll")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[]
                       ">

                                <span style='line-height: 30px;padding-right:0px'>{{:~t("network.search.type")}}</span>
                <input type="text" name="type" value="" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                            required:false,prompt:'{{:~t("common.prompt.emptyAll")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                            data:[{'KEY':'','TEXT':'{{:~t("common.option.all")}}'},{'KEY':'custom','TEXT':'{{:~t("network.search.type.custom")}}'},{'KEY':'builtin','TEXT':'{{:~t("network.search.type.builtin")}}'}]
                       ">

                                <span style='line-height: 30px;padding-right:0px'>{{:~t("network.search.scope")}}</span>
                <input type="text" name="scope" value="" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                            required:false,prompt:'{{:~t("common.prompt.emptyAll")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                            data:[{'KEY':'','TEXT':'{{:~t("common.option.all")}}'},{'KEY':'local','TEXT':'local'},{'KEY':'swarm','TEXT':'swarm'},{'KEY':'global','TEXT':'global'}]
                       ">

                <span style='line-height: 30px;padding-left:2px;padding-right:10px'></span>

                <input type="text" id='search_type' name="search_type" value="name" data-toggle="cubeui-combobox"
                       data-options="
                                width:120,
                                    required:true,prompt:'{{:~t("common.prompt.searchTypeRequired")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[{'KEY':'name','TEXT':'Name'},{'KEY':'label','TEXT':'Label'},{'KEY':'dangling','TEXT':'dangling'},
                                {'KEY':'id','TEXT':'ID'}]
                       ">
                <input type="text" id='search_key' name="search_key" data-toggle="cubeui-textbox"
                       data-options="onClear:function(){
                            $('#searchbtn').trigger('click');
                              }, mask:'{{:~js(prefix)}}', prompt:'{{:~t("common.prompt.searchKey")}}',width:420">
                <a href="javascript:void(0)" id="searchbtn"
                   data-toggle="cubeui-menubutton"
                   data-options="method:'query',
                   iconCls:'fa fa-search',
                   btnCls:'cubeui-btn-blue',
                   form:{id:'queryForm'},
                             grid:{type:'datagrid','id':'networksDg'}">{{:~t("common.btn.search")}}</a>
            </form>
        </div>
    </div>
</div>
<!-- 表格工具栏结束 -->
<div id="searchImageMm" data-toggle="cubeui-menu" style="width:120px;display:none" data-options="">
    <div onclick="pullImgFromMenu()" data-options="iconCls:'fa fa-download'">{{:~t("images.menu.pullLatest")}}</div>
    <div onclick="setImgFromMenu()" data-options="iconCls:'fa fa-check-square-o'">{{:~t("images.menu.setTag")}}</div>
</div>
</script>

</body>
<script>
    new APP(function () {
        return {
            css: [],
            js: [
                ROOT_RES_URL + "/api/api.js",
                ROOT_RES_URL + "/api/title.js",
                ROOT_RES_URL + "/network/network.js",
            ],
            render: function () {
                stop = true
                console.log("finish");


                APP.renderBody("#tmpl1", {})
                try {
                    if (typeof __network_applyControlsI18n === 'function') {
                        __network_applyControlsI18n();
                    }
                } catch (e) {}


                $.docker.request.info(local_node, function () {
                    $('#driver_network').combobox('loadData', $.docker.driver.network.getNetworkOpts())
                })

                // let t = $.templates("#tmpl1").render({id:"1022", name:"davidliu"})
                // $('body div').remove()
                // $(t).appendTo($('body'))
            }
        }
    });


    APP.fn(function(){
        loadLease();
    })
</script>
</html>
