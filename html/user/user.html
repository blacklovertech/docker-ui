<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:jc="http://www.joinsunsoft.com">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <script src="/static/common/js/ui.js"></script>
</head>

<body>
<div id="loading" class="loading-wrap">
    <div class="loading-content">
        <div class="loading-round"></div>
        <div class="loading-dot"></div>
    </div>
</div>

<script id="tmpl1" type="text/x-jquery-tmpl">

<div id='layout' data-toggle="cubeui-layout" data-options="fit:true">
    <div data-options="region:'center',title:'',split:false,collapsible:false,border:true,width:1000,iconCls:'fa fa-users',
    headerCls:'border_right',bodyCls:'border_right'">

        <table id="userDg"></table>

        <div id="userDg-toolbar" class="cubeui-toolbar"
             data-options="grid:{
                   type:'datagrid',
                   id:'userDg'
               }">

            <a href="javascript:void(0)" id="usersCreateBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        createUser();
                    },
                    btnCls: 'cubeui-btn-blue',
                    iconCls: 'fa fa-plus'
                }" data-i18n="users.toolbar.create">新增用户</a>

            <a href="javascript:void(0)" id="usersResetPwdBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        resetUserPwd();
                    },
                    btnCls: 'cubeui-btn-slateblue',
                    iconCls: 'fa fa-key'
                }" data-i18n="users.toolbar.resetPwd">修改密码</a>

            <a href="javascript:void(0)" id="usersRemoveBtn" data-toggle='cubeui-menubutton' data-options="{
                    onClick:function(){
                        removeUser();
                    },
                    extend: '#userDg-toolbar',
                    btnCls: 'cubeui-btn-red',
                    iconCls: 'fa fa-times'
                }" data-i18n="users.toolbar.remove">删除用户</a>

            <form id="queryForm" class="search-box">
                <a href="javascript:void(0)" id="searchbtn"
                   data-toggle="cubeui-menubutton"
                   data-options="method:'query',
                   iconCls:'fa fa-refresh',
                   btnCls:'cubeui-btn-blue',
                   form:{id:'queryForm'},
                         grid:{type:'datagrid','id':'userDg'}" data-i18n="common.btn.refresh">刷新</a>
            </form>
        </div>
    </div>
</div>
</script>

</body>

<script>
    new APP(function () {
        return {
            css: [],
            js: [
                ROOT_RES_URL + "/api/api.js",
                ROOT_RES_URL + "/api/title.js",
                ROOT_RES_URL + "/user/user.js",
            ],
            render: function () {
                stop = true
                APP.renderBody("#tmpl1", {})
            }
        }
    });

    APP.fn(function(){
        loadUsers();
    })
</script>
</html>
