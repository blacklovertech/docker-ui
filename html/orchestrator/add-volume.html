<div style="margin: 0px;">
</div>

<div class="cubeui-fluid">
    <fieldset>
        <legend data-i18n="orchestrator.form.volume.legend">数据卷信息</legend>
    </fieldset>
    <div class="cubeui-row">
        <div class="cubeui-col-sm12">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.volume.name">数据卷:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-textbox" name="Name"
                       value='{{:Name}}'
                       data-options="
                                required:true,prompt:'{{:~t("orchestrator.prompt.volume.name")}}'
                                "
                >
            </div>
        </div>
    </div>
    <div class="cubeui-row">
        <div class="cubeui-col-sm12">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.volume.driver">数据卷驱动:</label>
            <div class="cubeui-input-block">
                <input type="text" name="Driver" value="local" data-toggle="cubeui-combobox"
                       data-options="
                                limitToList:true,
                                required:true,prompt:'{{:~t("orchestrator.prompt.volume.driver")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:$.docker.utils.getLocalVolume()
                       ">
            </div>
        </div>
    </div>

    <fieldset>
        <legend style="margin-bottom: 0px;" data-i18n="orchestrator.form.driverOptions">驱动选项</legend>
    </fieldset>

    <div class="cubeui-row">
        <div class="cubeui-col-sm12 add-opt-div">
            <div class="cubeui-row">
                <div class="cubeui-col-sm4 cubeui-col-sm-offset2" style="padding-right: 5px">
                    <span style='line-height: 20px;padding-right:0px;' data-i18n="common.label.key">选项</span>
                </div>
                <div class="cubeui-col-sm5" >
                    <span style='line-height: 20px;padding-right:0px;' data-i18n="common.label.value">值</span>
                </div>
                <div class="cubeui-col-sm1" style="text-align: center">
                        <span style='line-height: 20px;padding-right:0px;'>
                            <span onClick="$.docker.utils.ui.addOpts(this,'driver-opt')" class="ops-fa-icon fa fa-plus" style="font-size:14px!important;">&nbsp;</span>
                        </span>
                </div>
            </div>
            <!--            <div class="cubeui-row">-->
            <!--                <div class="cubeui-col-sm4 cubeui-col-sm-offset2" style="padding-right: 5px">-->
            <!--                    <input type="text" data-toggle="cubeui-textbox"-->
            <!--                           value='{{:lease}}' data-options="required:false,prompt:'租约ID，选择填写，默认为空，不使用租约'">-->
            <!--                </div>-->
            <!--                <div class="cubeui-col-sm5">-->
            <!--                    <input type="text" data-toggle="cubeui-textbox"-->
            <!--                           value='{{:lease}}' data-options="required:false,prompt:'租约ID，选择填写，默认为空，不使用租约'">-->
            <!--                </div>-->
            <!--                <div class="cubeui-col-sm1" style="text-align: center">-->
            <!--                    <span style='line-height: 30px;padding-right:0px;'><span class="ops-fa-icon fa fa-close" style="font-size:14px!important;">&nbsp;</span></span>-->
            <!--                </div>-->
            <!--            </div>-->
        </div>
    </div>


    <fieldset>
        <legend style="margin-bottom: 0px;" data-i18n="orchestrator.form.labels">标签选项</legend>
    </fieldset>

    <div class="cubeui-row">
        <div class="cubeui-col-sm12 add-opt-div">
            <div class="cubeui-row">
                <div class="cubeui-col-sm4 cubeui-col-sm-offset2" style="padding-right: 5px">
                    <span style='line-height: 20px;padding-right:0px;' data-i18n="common.label.key">标签</span>
                </div>
                <div class="cubeui-col-sm5" >
                    <span style='line-height: 20px;padding-right:0px;' data-i18n="common.label.value">值</span>
                </div>
                <div class="cubeui-col-sm1" style="text-align: center">
                        <span style='line-height: 20px;padding-right:0px;'>
                            <span onClick="$.docker.utils.ui.addOpts(this, 'label')"  class="ops-fa-icon fa fa-plus" style="font-size:14px!important;">&nbsp;</span>
                        </span>
                </div>
            </div>
        </div>
    </div>



</div>
