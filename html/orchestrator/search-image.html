<div id='layout' data-toggle="cubeui-layout" data-options="fit:true">
    <div data-options="region:'center',title:'',split:false,collapsible:false,border:true,width:1000,iconCls:'fa fa-user-circle-o',
    headerCls:'border_right',bodyCls:'border_right'">

        <table id="searchImagesDg"></table>
        <!-- 表格工具栏开始 -->
        <div id="searchImagesDg-toolbar" class="cubeui-toolbar"
             data-options="grid:{
                   type:'datagrid',
                   id:'searchImagesDg'
               }">

            <form id="queryForm-search" class="search-box">
<!--                <input data-toggle="cubeui-checkbox" name="is-official" value="1" checked>-->
<!--                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;">官方</label>-->
<!--                <input data-toggle="cubeui-checkbox" name="is-official-not" value="1" checked>-->
<!--                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;">非官方</label>-->
                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;" data-i18n="orchestrator.searchImage.official">官方：</label>
                <input type="hidden" name="search" value="1"/>

                <input type="text" name="is_official" value="ALL" data-toggle="cubeui-combobox"
                       data-options="
                                width:150,
                                required:true,prompt:'{{:~t("orchestrator.searchImage.prompt.official")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[{'KEY':'ALL','TEXT':'{{:~t("common.option.all")}}'},{'KEY':'YES','TEXT':'{{:~t("orchestrator.searchImage.option.officialYes")}}'},{'KEY':'NO','TEXT':'{{:~t("orchestrator.searchImage.option.officialNo")}}'}]
                       ">

                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;" data-i18n="orchestrator.searchImage.automated">自动：</label>
                <input type="text" name="is_automated" value="ALL" data-toggle="cubeui-combobox"
                       data-options="
                                width:150,
                                required:true,prompt:'{{:~t("orchestrator.searchImage.prompt.automated")}}',
                                valueField:'KEY',
                                textField:'TEXT',
                                data:[{'KEY':'ALL','TEXT':'{{:~t("common.option.all")}}'},{'KEY':'YES','TEXT':'{{:~t("orchestrator.searchImage.option.automatedYes")}}'},{'KEY':'NO','TEXT':'{{:~t("orchestrator.searchImage.option.automatedNo")}}'}]
                       ">
                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;" data-i18n="orchestrator.searchImage.stars">星数：</label>
                <input type="text" name="stars" value="" data-toggle="cubeui-numberspinner"
                       data-options="
                                width:120,
                                min:0,
                                required:false,prompt:'{{:~t("orchestrator.searchImage.prompt.stars")}}',
                       ">
                <label class="textbox-label textbox-label-after" style="text-align:left;width: auto;" data-i18n="orchestrator.searchImage.term">过滤条件：</label>
                <input type="text" name="term" value="{{:imageName}}" data-toggle="cubeui-textbox"
                       data-options="onClear:function(){
                       }, mask:'{{:~js(prefix)}}', required:true,prompt:'{{:~t("orchestrator.searchImage.prompt.term")}}',width:240">
                <a href="javascript:void(0)" id="searchbtn2"
                   data-toggle="cubeui-menubutton"
                   data-options="method:'query',
                   iconCls:'fa fa-search',
                   btnCls:'cubeui-btn-blue',
                   form:{id:'queryForm-search'},
                   grid:{type:'datagrid','id':'searchImagesDg'}" data-i18n="common.btn.search">查询</a>
            </form>
        </div>
    </div>
</div>
