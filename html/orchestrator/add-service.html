<div style="margin: 0px;">
</div>

<div class="cubeui-fluid">
    <fieldset>
        <legend data-i18n="orchestrator.form.service.legend">服务基础选项</legend>
    </fieldset>
    <div class="cubeui-row">
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.name">服务名:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-textbox" name="Name"
                       value='{{:Name}}'
                       data-options="
                                required:true,prompt:'{{:~t("orchestrator.prompt.service.name")}}'
                                "
                >
            </div>
        </div>
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.image">镜像名称:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-textbox" id="fromImage" name="fromImage"
                       value='{{:repo}}'
                       data-options="
                                required:true,prompt:'{{:~t("orchestrator.prompt.service.image")}}'
                                "
                >
            </div>
        </div>
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.tag">TAG:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-textbox" name="tag" value="latest"
                       value='latest'
                       data-options="
                                required:false,prompt:'{{:~t("orchestrator.prompt.service.tag")}}'
                                "
                >
            </div>
        </div>
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.repo">仓库:</label>
            <div class="cubeui-input-block">
                <input type="text" name="repo" data-toggle="cubeui-combobox"
                       value='{{:repo}}'
                       data-options="
                                onSelect:function(record){
                                    console.log(record);
                                    $('#pull_username').textbox('setValue', record.Username);
                                    $('#pull_password').passwordbox('setValue', record.Password);
                                },
                                required:false,prompt:'{{:~t("orchestrator.prompt.service.repo")}}',
                                valueField:'ID',
                                textField:'Name',
                                data:$.docker.request.repos.getReposItem()
                       ">
            </div>
        </div>
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.username">用户名:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-textbox" id="pull_username" name="username"
                       value=''
                       data-options="
                                                        required:false,prompt:'{{:~t("orchestrator.prompt.service.username")}}'
                                                        "
                >
            </div>
        </div>
        <div class="cubeui-col-sm12" style="margin-top: 5px">
            <label class="cubeui-form-label" data-i18n="orchestrator.form.service.password">密码:</label>
            <div class="cubeui-input-block">
                <input type="text" data-toggle="cubeui-passwordbox"  id="pull_password"  name="password"
                       value=''
                       data-options="
                                                        required:false,prompt:'{{:~t("orchestrator.prompt.service.password")}}'
                                                        "
                >
            </div>
        </div>
    </div>
</div>
